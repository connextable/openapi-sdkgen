version: 2

builds:
  - id: openapi-sdkgen
    main: ./cmd/openapi-sdkgen
    binary: openapi-sdkgen
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - NOTICE

checksum:
  name_template: checksums.txt

release:
  mode: keep-existing
  replace_existing_artifacts: true

retry:
  attempts: 5
  delay: 5s
  max_delay: 1m
