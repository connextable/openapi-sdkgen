name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    concurrency:
      group: npm-publish
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Build npm package
        env:
          PACKAGE_VERSION: ${{ github.ref_name }}
        run: just agent npm-package "${PACKAGE_VERSION#v}"
      - name: Verify npm package
        run: just agent npm-package-check
      - name: Publish npm package through OIDC
        run: just agent npm-publish .tmp/npm-package ${{ contains(github.ref_name, '-') && 'next' || 'latest' }}

  publish-homebrew:
    needs: release
    uses: connextable/homebrew-tap/.github/workflows/publish-formula.yml@ca59d9ca7f476daa09af2168440f20ad37ef3ac3 # ca59d9c
    with:
      formula: openapi-sdkgen
      ref: ${{ github.ref }}
      version: ${{ github.ref_name }}
    secrets:
      deploy_key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
